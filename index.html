window.__PREV_DATA = {};

let ventaFilter = {tipo:'Todos',barrio:'Todos',search:''};
let alquilerFilter = {tipo:'Todos',barrio:'Todos',search:''};

function getUnique(arr, field) {
  const s = new Set(arr.map(i => i[field]).filter(Boolean));
  return ['Todos', ...s];
}

function filterItems(items, f) {
  return items.filter(i => {
    const b = (i.barrio||'').includes('Saavedra')?'Saavedra':(i.barrio||'').toLowerCase().includes('n')?'Núñez':'Coghlan';
    if (f.tipo !== 'Todos' && i.tipo !== f.tipo) return false;
    if (f.barrio !== 'Todos' && !extraerBarrio(i.barrio).includes(f.barrio.replace('Núñez','').replace('N','N'))) return false;
    if (f.search) {
      const q = f.search.toLowerCase();
      if (!(i.address||'').toLowerCase().includes(q) && !(i.tipo||'').toLowerCase().includes(q) && !(i.barrio||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function extraerBarrio(b) {
  if (!b) return '—';
  if (/saavedra/i.test(b)) return 'Saavedra';
  if (/n.ez/i.test(b)) return 'Núñez';
  if (/coghlan/i.test(b)) return 'Coghlan';
  return b.split(',')[0].trim();
}

function getDias(diasStr) {
  if (!diasStr) return 999;
  if (/hoy/i.test(diasStr)) return 0;
  const m = diasStr.match(/(\d+)/);
  return m ? parseInt(m[1]) : 999;
}

function renderCards(items, containerId) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = '<div class="no-results">No se encontraron propiedades</div>'; return; }
  el.innerHTML = items.map(i => {
    const d = getDias(i.dias);
    const barrio = extraerBarrio(i.barrio);
    const imgSrc = i.img || '';
    const pc = d<=30?'pill-green':d<=60?'pill-yellow':'pill-red';
    const dl = d===0?'Hoy':d===999?'—':d+'d';
    return '<div class="card"><a href="'+(i.url||'#')+'" target="_blank" rel="noopener" class="card-img-link">'+(imgSrc?'<img class="card-img" src="'+imgSrc+'" loading="lazy" onerror="this.style.display=\'none\'" alt="">':'')+'<span class="pill '+pc+' dias-pill">'+dl+'</span></a><div class="card-body"><div class="card-price">'+(i.price||'—')+'</div>'+(i.preciom2?'<div class="card-pm2">USD '+i.preciom2+'/m²</div>':'')+'<div class="card-address">'+(i.address||'Sin dirección')+'</div><div class="card-barrio">'+barrio+' · '+i.tipo+'</div><div class="card-attrs">'+(i.superficie||'')+' '+(i.attrs||'')+'</div></div></div>';
  }).join('');
}

function updateStats(items, prefix) {
  const prices = items.map(i => { const m=(i.price||'').match(/[\d.,]+/); return m?parseFloat(m[0].replace(/\./g,'').replace(',','.')):0; }).filter(p=>p>0);
  const avg = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;
  document.getElementById(prefix+'total').textContent = items.length;
  if(document.getElementById(prefix+'avg')) document.getElementById(prefix+'avg').textContent = avg ? 'USD '+avg.toLocaleString('es-AR') : '—';
  const newItems = items.filter(i => getDias(i.dias) <= 14);
  if(document.getElementById(prefix+'new')) document.getElementById(prefix+'new').textContent = newItems.length;
}

function setupFilters(items, filterObj, containerId, prefix) {
  const tipos = ['Todos','PH','Oficina','Bodega/Galpón','Depósito'];
  const barrios = ['Todos','Saavedra','Núñez','Coghlan'];
  
  const tipoEl = document.getElementById(prefix+'tipo');
  const barrioEl = document.getElementById(prefix+'barrio');
  const searchEl = document.getElementById(prefix+'search');
  
  tipoEl.innerHTML = tipos.map(t => '<button class="filter-btn'+(t==='Todos'?' active':'')+'" onclick="setFilter(\''+prefix+'\',\'tipo\',\''+t+'\',this)">'+t+'</button>').join('');
  barrioEl.innerHTML = barrios.map(b => '<button class="filter-btn'+(b==='Todos'?' active':'')+'" onclick="setFilter(\''+prefix+'\',\'barrio\',\''+b+'\',this)">'+b+'</button>').join('');
  
  searchEl.addEventListener('input', () => {
    filterObj.search = searchEl.value;
    applyFilter(prefix);
  });
  
  renderCards(items, containerId);
  updateStats(items, prefix);
}

window._filters = { venta: ventaFilter, alquiler: alquilerFilter };
window._items = { venta: allVenta, alquiler: allAlquiler };

function setFilter(prefix, field, val, btn) {
  window._filters[prefix][field] = val;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(prefix);
}

function applyFilter(prefix) {
  const f = window._filters[prefix];
  const filtered = filterItems(window._items[prefix], f);
  const containerId = prefix === 'venta' ? 'ventaGrid' : 'alquilerGrid';
  renderCards(filtered, containerId);
  updateStats(filtered, prefix+'_');
}

function filterItems(items, f) {
  return items.filter(i => {
    const b = extraerBarrio(i.barrio);
    if (f.tipo !== 'Todos' && i.tipo !== f.tipo) return false;
    if (f.barrio !== 'Todos' && b !== f.barrio) return false;
    if (f.search) { const q = f.search.toLowerCase(); if (!(i.address||'').toLowerCase().includes(q) && !(i.tipo||'').toLowerCase().includes(q) && !(i.barrio||'').toLowerCase().includes(q) && !(i.price||'').includes(q)) return false; }
    return true;
  });
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab_'+tab).classList.add('active');
  document.getElementById('sec_'+tab).classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => {
  setupFilters(allVenta, ventaFilter, 'ventaGrid', 'venta_');
  setupFilters(allAlquiler, alquilerFilter, 'alquilerGrid', 'alquiler_');
  showTab('venta');
});
</script>
